name: Linux Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: linux-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.8.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm --filter @hypershell/ui exec playwright install --with-deps chromium

      - name: Workspace build
        run: pnpm ci:build

      - name: Workspace unit tests
        run: pnpm ci:test

      - name: Playwright smoke
        run: pnpm ci:test:e2e

      - name: Rebuild native modules for Electron
        run: pnpm --filter @hypershell/desktop rebuild:native

      - name: Package unsigned Linux release
        run: pnpm release:linux:unsigned

      - name: Generate release manifest
        run: pnpm release:manifest

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-release-${{ github.ref_name }}
          path: apps/desktop/release/**
          if-no-files-found: error
          retention-days: 30

      - name: Attach Linux artifacts to GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          for FILE in apps/desktop/release/*.{AppImage,deb}; do
            if [ -f "$FILE" ]; then
              echo "Uploading $FILE to release $TAG"
              gh release upload "$TAG" "$FILE" --clobber
            fi
          done
