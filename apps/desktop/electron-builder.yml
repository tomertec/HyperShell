appId: com.sshterm.desktop
productName: SSHTerm
npmRebuild: false
asar: true
asarUnpack:
  - "**/better-sqlite3/**"
  - "**/node-pty/**"
  - "**/serialport/**"
  - "**/@serialport/**"
files:
  - dist/**/*
  - package.json
directories:
  output: release
win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: sshterm-${version}-${arch}.${ext}
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  shortcutName: SSHTerm
mac:
  target:
    - target: dmg
      arch:
        - x64
    - target: zip
      arch:
        - x64
  artifactName: sshterm-${version}-mac-${arch}.${ext}
  category: public.app-category.developer-tools
  darkModeSupport: true
  hardenedRuntime: true
  entitlements: entitlements.mac.plist
  entitlementsInherit: entitlements.mac.plist
dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
extraResources:
  - from: assets
    to: assets
    filter:
      - "**/*"
publish: null
