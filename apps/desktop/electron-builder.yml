appId: com.hypershell.desktop
productName: HyperShell
npmRebuild: false
asar: true
asarUnpack:
  - "**/better-sqlite3/**"
  - "**/node-pty/**"
  - "**/serialport/**"
  - "**/@serialport/**"
files:
  - dist/**/*
  - package.json
directories:
  output: release
win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch:
        - x64
  artifactName: hypershell-${version}-${arch}.${ext}
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  shortcutName: HyperShell
mac:
  target:
    - target: dmg
      arch:
        - x64
    - target: zip
      arch:
        - x64
  artifactName: hypershell-${version}-mac-${arch}.${ext}
  category: public.app-category.developer-tools
  darkModeSupport: true
  hardenedRuntime: true
  entitlements: entitlements.mac.plist
  entitlementsInherit: entitlements.mac.plist
linux:
  icon: build/icon.png
  category: Development
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  artifactName: hypershell-${version}-linux-${arch}.${ext}
  desktop:
    entry:
      Name: HyperShell
      Comment: SSH & Serial Terminal
      Terminal: "false"
      Type: Application
      Categories: Development;Network;
dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
extraResources:
  - from: assets
    to: assets
    filter:
      - "**/*"
publish: null
